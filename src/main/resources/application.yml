server:
  port: ${PORT:8070}

spring:
  application:
    name: perf-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/flow_engine}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
      dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

# URL of the main flow-engine app — used to fetch step config at test start
flow-engine:
  base-url: ${FLOW_ENGINE_URL:http://localhost:8060}
  # Internal API key — set the same value in both services via env var
  internal-api-key: ${INTERNAL_API_KEY:internal_api_key_1234567890}

# How many virtual users can be running simultaneously across all tests.
# Each virtual user is one thread — keep this below your deployment's thread limit.
perf:
  max-total-virtual-users: ${MAX_VIRTUAL_USERS:200}

logging:
  level:
    com.example.perfservice: INFO