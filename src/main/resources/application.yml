server:
  port: ${PORT:8070}

spring:
  application:
    name: perf-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/flow_engine}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

# JWT secret — must be the SAME value as app.jwt.secret in the main app.
# Set JWT_SECRET env var identically on both services.
# Industry standard: both services trust the same token issuer (main app),
# so a token the frontend gets from main app is valid on perf service too —
# no separate auth server, no internal key needed for user-facing requests.
app:
  jwt:
    secret: ${JWT_SECRET:flowengine-jwt-secret-key-change-in-production-min-32-chars}

perf:
  max-total-virtual-users: ${MAX_VIRTUAL_USERS:200}

logging:
  level:
    com.example.perfservice: INFO